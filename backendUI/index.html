<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FinApp26 Backend Monitor</title>
<style>
  :root {
    --bg: #080B11;
    --panel: #10151f;
    --border: #1d2532;
    --text-hi: #EAEFF6;
    --text: #A9B5C6;
    --brand: #7C6CF5;
    --up: #2FE6A6;
    --down: #FF5470;
    --warn: #F5B942;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-hi);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 32px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--text); font-size: 13px; margin-bottom: 20px; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .toolbar input {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-hi);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    width: 240px;
  }
  .toolbar button {
    background: var(--brand);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  .toolbar button:hover { opacity: 0.9; }
  .toolbar .status-pill {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 100px;
    border: 1px solid var(--border);
  }
  .pill-ok { color: var(--up); border-color: rgba(47,230,166,0.35); }
  .pill-down { color: var(--down); border-color: rgba(255,84,112,0.35); }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
    max-width: 720px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .card .n { font-size: 24px; font-weight: 600; }
  .card .l { font-size: 12px; color: var(--text); margin-top: 2px; }

  .table-scroll {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  table {
    width: 100%;
    min-width: 760px;
    border-collapse: collapse;
    background: var(--panel);
  }
  th, td {
    text-align: left;
    padding: 10px 14px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  th {
    color: var(--text);
    font-weight: 500;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.04em;
  }
  tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 100px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .badge-running { background: rgba(124,108,245,0.15); color: var(--brand); }
  .badge-running .dot { background: var(--brand); animation: pulse 1.2s infinite; }
  .badge-idle { background: rgba(169,181,198,0.1); color: var(--text); }
  .badge-idle .dot { background: var(--text); }
  .badge-ok { background: rgba(47,230,166,0.12); color: var(--up); }
  .badge-ok .dot { background: var(--up); }
  .badge-error { background: rgba(255,84,112,0.12); color: var(--down); }
  .badge-error .dot { background: var(--down); }
  .badge-never { background: rgba(245,185,66,0.12); color: var(--warn); }
  .badge-never .dot { background: var(--warn); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .job-name { font-weight: 600; }
  .muted { color: var(--text); }
  .err {
    color: var(--down);
    max-width: 360px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: inline-block;
    vertical-align: bottom;
    cursor: help;
  }
  .run-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-hi);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .run-btn:hover { border-color: var(--brand); color: var(--brand); }
  .run-btn:disabled { opacity: 0.4; cursor: default; }

  .empty { padding: 40px; text-align: center; color: var(--text); }
</style>
</head>
<body>
  <h1>FinApp26 Backend Monitor</h1>
  <div class="sub">Live status of every scheduled sync job in the NestJS backend</div>

  <div class="toolbar">
    <input id="baseUrl" value="http://localhost:4100" spellcheck="false" />
    <button onclick="refresh()">Refresh now</button>
    <span id="connStatus" class="status-pill pill-down">checking...</span>
    <span class="muted" style="font-size:12px;">auto-refreshes every 5s</span>
  </div>

  <div class="cards">
    <div class="card"><div class="n" id="cardTotal">–</div><div class="l">Services</div></div>
    <div class="card"><div class="n" id="cardRunning">–</div><div class="l">Running now</div></div>
    <div class="card"><div class="n" id="cardOk">–</div><div class="l">Last run OK</div></div>
    <div class="card"><div class="n" id="cardError">–</div><div class="l">Last run errored</div></div>
  </div>

  <div id="tableWrap"></div>

<script>
let refreshing = false;

function fmtTime(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  const diffMs = Date.now() - d.getTime();
  const mins = Math.round(diffMs / 60000);
  let rel;
  if (mins < 1) rel = 'just now';
  else if (mins < 60) rel = `${mins}m ago`;
  else if (mins < 1440) rel = `${Math.round(mins / 60)}h ago`;
  else rel = `${Math.round(mins / 1440)}d ago`;
  return `${d.toLocaleString()} (${rel})`;
}

function statusBadge(job) {
  if (job.isRunning) {
    return `<span class="badge badge-running"><span class="dot"></span>Running</span>`;
  }
  if (!job.lastSyncedAt) {
    return `<span class="badge badge-never"><span class="dot"></span>Never run</span>`;
  }
  return `<span class="badge badge-idle"><span class="dot"></span>Idle</span>`;
}

function lastRunBadge(job) {
  if (!job.lastSyncedAt) return `<span class="muted">—</span>`;
  if (job.lastStatus === 'ok') {
    return `<span class="badge badge-ok"><span class="dot"></span>OK</span>`;
  }
  return `<span class="badge badge-error"><span class="dot"></span>Error</span>`;
}

async function runJob(name, btn) {
  btn.disabled = true;
  btn.textContent = 'Running…';
  const base = document.getElementById('baseUrl').value.replace(/\/$/, '');
  try {
    await fetch(`${base}/sync/${name}/run`, { method: 'POST' });
  } catch (e) {
    // surfaced on next refresh via lastStatus/lastError
  }
  setTimeout(refresh, 800);
}

function render(jobs) {
  const total = jobs.length;
  const running = jobs.filter(j => j.isRunning).length;
  const ok = jobs.filter(j => j.lastStatus === 'ok').length;
  const errored = jobs.filter(j => j.lastStatus === 'error').length;

  document.getElementById('cardTotal').textContent = total;
  document.getElementById('cardRunning').textContent = running;
  document.getElementById('cardOk').textContent = ok;
  document.getElementById('cardError').textContent = errored;

  if (total === 0) {
    document.getElementById('tableWrap').innerHTML = `<div class="empty">No sync jobs registered.</div>`;
    return;
  }

  const rows = jobs
    .slice()
    .sort((a, b) => a.name.localeCompare(b.name))
    .map(job => `
      <tr>
        <td class="job-name">${job.name}</td>
        <td>${statusBadge(job)}</td>
        <td>${lastRunBadge(job)}</td>
        <td class="muted">${fmtTime(job.lastSyncedAt) ?? '—'}</td>
        <td class="muted">${job.lastCount ?? '—'}</td>
        <td>${job.lastError ? `<span class="err" title="${job.lastError.replace(/"/g, '&quot;')}">${job.lastError}</span>` : '<span class="muted">—</span>'}</td>
        <td><button class="run-btn" ${job.isRunning ? 'disabled' : ''} onclick="runJob('${job.name}', this)">${job.isRunning ? 'Running…' : 'Run now'}</button></td>
      </tr>
    `).join('');

  document.getElementById('tableWrap').innerHTML = `
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Service</th>
            <th>State</th>
            <th>Last Run</th>
            <th>Last Run Time</th>
            <th>Docs Written</th>
            <th>Last Error</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

async function refresh() {
  if (refreshing) return;
  refreshing = true;
  const base = document.getElementById('baseUrl').value.replace(/\/$/, '');
  const pill = document.getElementById('connStatus');
  try {
    const res = await fetch(`${base}/sync/jobs`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const jobs = await res.json();
    pill.textContent = 'connected';
    pill.className = 'status-pill pill-ok';
    render(jobs);
  } catch (e) {
    pill.textContent = 'backend unreachable';
    pill.className = 'status-pill pill-down';
    document.getElementById('tableWrap').innerHTML = `<div class="empty">Can't reach the backend at this URL. Is it running? (npm run start:dev in backend/)</div>`;
  } finally {
    refreshing = false;
  }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
