openapi: 3.0.3
info:
  title: StockWise (FinApp26) Market Data API
  version: 1.0.0
  description: |
    Canonical read API for every screen in StockWise. This documents the **data
    contract** the frontend consumes — today implemented as direct Firestore
    reads (via `useCollection()` in `app/iq/hooks/useCollection.ts`) rather than
    a deployed REST gateway, so every path below maps 1:1 to a Firestore
    collection written by a NestJS sync job in `backend/src/sync/`. The shapes
    are copied verbatim from the actual job code (not from the earlier planning
    doc `Doc/05_API_Vendor_Tracker.md`, which has drifted from what is really
    implemented — e.g. `analyst_actions` was planned as a per-event
    upgrade/downgrade feed but is actually a consensus-vote snapshot today).

    **Status legend** (see `x-status` on every path):
    - `live` — job exists, writes real data, screen(s) already read it.
    - `planned` — no backend job exists yet; schema is a proposed shape based
      on the named vendor's typical payload. Nothing reads/writes this today.

    **Source legend** (see `x-primary-source` / `x-alternate-source` on every
    path): the vendor actually wired in `backend/src/vendors/`, plus a faster
    or more complete alternate and why it's faster — see each path's
    description for specifics.

    **Swapping a source never changes this document — and fallback is
    automatic and never silent.** `Company` and `MarketMover` (the two
    collections with a documented alternate vendor today) are populated
    through a small adapter layer (`backend/src/adapters/`) — each sync job
    depends only on a `CompanyProfileAdapter` / `MoversAdapter` /
    `MoverEnrichmentAdapter` interface, never on a vendor SDK directly. Each
    of the three has two working implementations wired behind a
    `Composite*Adapter`: if the configured primary
    (`COMPANY_PROFILE_SOURCE` / `MOVERS_SOURCE` / `MOVER_ENRICHMENT_SOURCE`)
    throws or has no data, the configured fallback
    (`COMPANY_PROFILE_FALLBACK_SOURCE` / `MOVERS_FALLBACK_SOURCE` /
    `MOVER_ENRICHMENT_FALLBACK_SOURCE`) is tried automatically and the
    result carries a `FALLBACK_USED` warning — the request still succeeds.
    Only when *every* configured source fails does the request return an
    error (502 `UPSTREAM_VENDOR_ERROR`, with `fallbackAttempted` listing
    every source tried and why each failed) — never a silent empty/null
    result. All of this is read once, in `adapters.module.ts`. The `source`
    field on both schemas below records which adapter actually produced a
    given document (which may be the fallback, not the configured primary);
    both fields are additive, so they don't break any consumer that
    predates them.

    **Write-pattern legend** (see `x-write-pattern` on every live path): a
    path is one of `MUTABLE / upsert-latest` (a current-state snapshot,
    overwritten every sync — e.g. today's price), `IMMUTABLE / append-only`
    (once a row's natural key exists, its data can never legitimately
    change — e.g. a closed trading day's mover, a filed Form 4, a published
    article — so writes use an insert-if-not-exists pattern and re-syncing
    an overlapping range is a cheap no-op, never a duplicate), or `HYBRID`
    (starts mutable, becomes immutable once a specific field settles — e.g.
    an earnings estimate becomes a permanent actual). Three collections —
    market-movers, sectors, market-indices — ship BOTH a mutable "latest"
    endpoint and a paired immutable "history" endpoint written in the same
    transaction, so neither loses data: the latest endpoint answers "what's
    true right now," the history endpoint answers "what was true on date X"
    and never forgets. See `Doc/schema.sql` for the equivalent relational
    write patterns (`ON CONFLICT ... DO NOTHING` vs `DO UPDATE`) if you
    migrate off Firestore.
  contact:
    name: StockWise Engineering
    email: hello@inc108.com
servers:
  - url: https://api.finapp26.app/v1
    description: >-
      Proposed REST gateway (NOT deployed). Would front the same Firestore
      collections listed here for non-web consumers (mobile, third parties).
  - url: http://localhost:4100
    description: >-
      NestJS backend today — only the Ops endpoints below are actually
      exposed here. All other paths are Firestore reads from the client SDK,
      documented as REST for a portable, vendor-agnostic contract.

tags:
  - name: Ops
    description: Sync-job control plane, actually implemented and running on the NestJS backend.
  - name: Companies
    description: Reference + fundamentals data. Feeds Dashboard, Themes, Watchlist, Portfolio, Screener, Stock Detail.
  - name: MarketMovers
    description: Daily gainers/losers. Feeds Market Movers, Dashboard, Heatmap mini.
  - name: Sectors
    description: Sector-level performance. Feeds Sector Heatmap, Themes.
  - name: Indices
    description: Market pulse indices (S&P/Nasdaq/Dow/VIX/etc, via ETF proxies). Feeds Dashboard pulse strip, Macro & VIX.
  - name: Earnings
    description: Earnings calendar + actuals. Feeds Earnings Hub, Dashboard.
  - name: Analyst
    description: Analyst ratings. Feeds Analyst Actions screen.
  - name: Insider
    description: Form 4 insider transactions + 13F institutional holdings. Feeds Insider & Institutional screen.
  - name: News
    description: Company headlines. Feeds Commentary/News, Dashboard live feed.
  - name: IPOs
    description: IPO calendar. Feeds IPOs screen. Not yet built.
  - name: Macro
    description: Economic calendar. Feeds Macro & VIX screen. Not yet built.
  - name: Dividends
    description: Dividend calendar. Feeds Macro screen dividend panel. Not yet built.
  - name: Options
    description: Options chains, unusual flow, dark pool/block trades. Feeds Options Chain screen. Not yet built, blocked on vendor keys.
  - name: Recaps
    description: EOD/weekly AI narrative recaps. Feeds Recap screen. Not yet built, blocked on Claude key.
  - name: StockHistory
    description: Historical OHLCV bars. Feeds Stock Detail chart. Not yet built.
  - name: UserData
    description: Per-user watchlist/portfolio/comments/settings — owned by the user, not a vendor feed.

paths:
  # ────────────────────────────────────────────────────────────────────────
  # OPS — actually implemented today on the NestJS backend
  # ────────────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Ops]
      summary: Backend liveness check
      x-status: live
      x-consumed-by:
        - "Not screen-facing — no StockWise screen calls this. Used for manual health checks and could back a future uptime monitor."
      x-primary-source: none (self-check)
      operationId: getHealth
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  service: { type: string, example: finapp26-backend }
                  time: { type: string, format: date-time }

  /sync/jobs:
    get:
      tags: [Ops]
      summary: List every registered sync job with running + last-run state
      x-status: live
      x-consumed-by:
        - "Not a StockWise screen — consumed by backendUI (backendUI/index.html), the separate static ops dashboard, not the Next.js app."
      operationId: listSyncJobs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SyncJobStatus" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /sync/status:
    get:
      tags: [Ops]
      summary: Last-run status for every job (no running-state)
      x-status: live
      x-consumed-by:
        - "Not a StockWise screen — ops-only, same as GET /sync/jobs."
      operationId: getAllSyncStatus
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SyncMeta" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /sync/{job}/status:
    get:
      tags: [Ops]
      summary: Last-run status for one job
      x-status: live
      x-consumed-by:
        - "Not a StockWise screen — ops-only, same as GET /sync/jobs."
      operationId: getSyncStatus
      parameters:
        - $ref: "#/components/parameters/JobName"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SyncMeta" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /sync/{job}/run:
    post:
      tags: [Ops]
      summary: Manually trigger a sync job (for testing)
      x-status: live
      x-consumed-by:
        - "Not a StockWise screen — ops-only, same as GET /sync/jobs."
      operationId: runSyncJob
      parameters:
        - $ref: "#/components/parameters/JobName"
      responses:
        "200":
          description: Job ran; per-job result shape (counts vary by job)
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "404":
          description: Unknown job name
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502": { $ref: "#/components/responses/UpstreamError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /sync/run-all:
    post:
      tags: [Ops]
      summary: Manually trigger every registered sync job (for testing)
      x-status: live
      x-consumed-by:
        - "Not a StockWise screen — ops-only. \"Run all now\" button in backendUI/index.html, added 2026-07-09."
      x-write-pattern: >-
        Runs every job sequentially, not in parallel — several jobs already
        rate-limit themselves internally against a single vendor (e.g.
        news.job.ts's per-ticker delay, SEC EDGAR's 10 req/sec throttle in
        sec-13f/sec-form4), and concurrent execution would stack unrelated
        jobs' bursts on top of each other for no benefit. A job already
        mid-run (its own cron fired concurrently) is skipped, not
        double-invoked. One job's failure doesn't stop the rest. This hits
        every configured vendor API back-to-back and can take a few minutes
        for all 17 jobs — a real action with real vendor-quota cost, not a
        cheap health check.
      operationId: runAllSyncJobs
      responses:
        "201":
          description: Every job attempted; per-job outcome in `results`
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer }
                  succeeded: { type: integer }
                  failed: { type: integer }
                  skipped: { type: integer, description: "Jobs already mid-run when run-all started" }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        job: { type: string }
                        ok: { type: boolean }
                        skipped: { type: boolean }
                        count: { type: integer, nullable: true }
                        error: { type: string, nullable: true }

  # ────────────────────────────────────────────────────────────────────────
  # COMPANIES — live
  # ────────────────────────────────────────────────────────────────────────
  /companies:
    get:
      tags: [Companies]
      summary: List company reference + fundamentals data
      description: >-
        Two independent jobs write to this collection: companies.job.ts
        (fundamentals, daily) and rs-rating.job.ts (just the `rsRating`
        field, also daily, pure internal computation — see that job's
        docblock, no vendor call involved).
      x-status: live
      x-consumed-by:
        - "Dashboard (app/iq/screens/dashboard.tsx) — Market Heatmap mini (per-stock market cap/%change), Portfolio Pulse mini (live price/% on holdings), Watchlist mini (live price/% on watched tickers)"
        - "Screener (app/iq/screens/screener.tsx) — Market cap, P/E, and Relative Strength columns/filters (rsRating merged onto relativeStrength when available)"
        - "Market Heatmap (app/iq/screens/heatmap.tsx) — Stock cells (market cap, % change)"
        - "Themes (app/iq/screens/themes.tsx) — Per-stock price/% change on each theme's stock list"
        - "Portfolio Pulse (app/iq/screens/portfolio.tsx) — Price/% change on demo or real holdings"
        - "Watchlist (app/iq/screens/watchlist.tsx) — Price/% change on demo or real watched tickers"
        - "Stock Detail (app/iq/screens/stock.tsx) — Price, % change, market cap, P/E, dividend yield, beta, sector (single-point merge, tagged \"live quote · FMP\")"
      x-primary-source: >-
        FMP `/stable/profile` + `/stable/ratios-ttm` + `/stable/stock-peers`
        (backend/src/vendors/fmp), synced daily at 02:00 ET for a rotating
        60-ticker batch of the 241-name curated universe
        (backend/src/common/ticker-universe.ts). `rsRating` specifically is
        computed daily at 04:00 ET by rs-rating.job.ts from `ohlcv_bars`
        history — not from FMP at all, see /stock-history above.
      x-alternate-source: >-
        Polygon `/v3/reference/tickers` + `/v2/aggs/ticker/{t}/prev` for the
        price/quote/market-cap fields ONLY — Polygon snapshots refresh faster
        (intraday-capable vs FMP's once-daily fundamentals sync) but has no
        equivalent for P/E, dividend yield, or peers, so it can only replace
        the price-tier fields, not the full profile.
      x-fallback-behavior: >-
        Automatic. Configured via COMPANY_PROFILE_SOURCE (default fmp) and
        COMPANY_PROFILE_FALLBACK_SOURCE (default polygon). If FMP throws
        (network/5xx/plan-rejection) or has no profile for the ticker, the
        composite adapter automatically retries against Polygon and tags
        the result with a FALLBACK_USED warning — the request still returns
        200, not an error. Only if BOTH sources fail does this return 502
        with every attempt listed in `fallbackAttempted`. Set
        COMPANY_PROFILE_FALLBACK_SOURCE=none to disable and fail fast on
        the primary alone.
      x-write-pattern: >-
        MUTABLE / upsert-latest. `companies/{ticker}` is overwritten on
        every sync (`INSERT ... ON CONFLICT (ticker) DO UPDATE`) — there is
        no history table for company profiles today; only price-history
        (see /stock-history, planned) would need append-only semantics.
      operationId: listCompanies
      parameters:
        - name: tickers
          in: query
          description: Comma-separated tickers to filter to (omit for the full synced universe)
          schema: { type: string, example: "AAPL,MSFT,NVDA" }
        - name: sector
          in: query
          schema: { type: string, example: Technology }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Company" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "502": { $ref: "#/components/responses/UpstreamError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /companies/{ticker}:
    get:
      tags: [Companies]
      summary: Single company by ticker
      x-status: live
      x-consumed-by:
        - "Same screens/features as GET /companies above — the frontend subscribes to the whole companies collection via useCollection() and merges client-side rather than fetching one ticker at a time, so this single-ticker path documents the equivalent Firestore doc shape, not a distinct call site."
      x-primary-source: FMP `/stable/profile` + `/stable/ratios-ttm` + `/stable/stock-peers`
      x-alternate-source: Polygon `/v2/aggs/ticker/{ticker}/prev` (price fields only, faster refresh)
      x-fallback-behavior: >-
        Same automatic FMP-then-Polygon fallback as `GET /companies` — see
        that path's x-fallback-behavior for the full mechanics. A 404 here
        means neither source has ever heard of the ticker; a 502 means both
        sources errored (rate limit, outage, etc.) rather than simply
        lacking the ticker.
      operationId: getCompany
      parameters:
        - $ref: "#/components/parameters/Ticker"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Company" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "502": { $ref: "#/components/responses/UpstreamError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  # ────────────────────────────────────────────────────────────────────────
  # TICKERS — live (full US universe: reference metadata + daily price)
  # ────────────────────────────────────────────────────────────────────────
  /tickers:
    get:
      tags: [Companies]
      summary: Full US ticker universe — reference data + daily price (no fundamentals)
      description: >-
        Answers "what tickers exist" (name/exchange/type/active/cik) AND
        "what's it trading at" (price/%change/volume) for essentially the
        entire US market, not just the 241-ticker curated universe
        `/companies` covers. The price fields are effectively free: Polygon's
        grouped-daily endpoint returns the whole market's EOD bars in one
        call, already fetched daily for `/market-movers` — this just writes
        the rest of that same response instead of discarding it. Still no
        fundamentals (P/E, sector, dividend yield, peers, beta) for the full
        universe — that needs one FMP call per ticker, which doesn't scale
        here yet; use `GET /companies/{ticker}` for that on the curated
        subset (may 404 outside it).
      x-status: live
      x-consumed-by:
        - "Shell (app/iq/shell.tsx) — Cmd+K / top search bar, via app/iq/hooks/useTickerSearch.ts. NOT a useCollection() full-collection subscription (that would download all ~10,000 docs on every page load, since the shell wraps every screen) — instead a scoped, on-demand Firestore range query (where ticker >= Q AND ticker < Q+highChar, limited to 20 results), fired only when the user types, debounced 200ms. Ticker-prefix matching only; company-name search (e.g. typing \"Apple\" to find AAPL) isn't implemented — would need a normalized lowercase name field added to ticker-universe.job.ts first."
        - "Screener (app/iq/screens/screener.tsx) does NOT read this collection — its picker is still limited to the curated 241-ticker TICKER_UNIVERSE via the companies collection. Expanding Screener itself to the full universe is a separate, not-yet-done step."
      x-primary-source: >-
        Reference fields: Polygon `/v3/reference/tickers`, paginated
        (~1000/page), synced weekly (Sunday 03:00 ET) —
        ticker-universe.job.ts. Price fields: Polygon grouped-daily EOD bars
        diffed across the two most recent trading days (same 2-call diff
        `/market-movers` uses, see backend/src/vendors/polygon/polygon-diff.util.ts),
        synced daily at 18:07 ET — market-quotes.job.ts. Both merge onto the
        same `tickers/{ticker}` doc.
      x-alternate-source: >-
        SEC EDGAR `company_tickers.json` — completely free, no key, no rate
        limit, and already fetched elsewhere in this backend (Form 4 CIK
        lookups) — but narrower coverage (SEC filers only, no ETF/type/
        exchange/active-flag distinction, no price at all) so it's a
        cross-reference for CIK mapping, not a replacement discovery source.
      x-write-pattern: >-
        MUTABLE / upsert-latest. `tickers/{ticker}` is overwritten (merged)
        on every weekly reference-data run and every daily price run; no
        history is kept for either.
      operationId: listTickers
      parameters:
        - name: type
          in: query
          description: Filter by Polygon security type, e.g. CS (common stock), ETF, ADRC, WARRANT
          schema: { type: string }
        - name: exchange
          in: query
          description: Filter by primary exchange (Polygon MIC code, e.g. XNAS, XNYS)
          schema: { type: string }
        - name: active
          in: query
          schema: { type: boolean, default: true }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 1000 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/TickerListing" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "502": { $ref: "#/components/responses/UpstreamError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  # ────────────────────────────────────────────────────────────────────────
  # MARKET MOVERS — live
  # ────────────────────────────────────────────────────────────────────────
  /market-movers:
    get:
      tags: [MarketMovers]
      summary: Top gainers/losers (EOD)
      description: |
        RVOL/catalyst/weekly-% columns are NOT in this feed (see mock-merge
        note) — only price/pctChange/volume/sector/cap are real.
      x-status: live
      x-consumed-by:
        - "Market Movers (app/iq/screens/movers.tsx) — Mover rows (price/%change/name/sector/cap); live-only tickers not in the mock set are appended with neutral placeholders"
        - "Dashboard (app/iq/screens/dashboard.tsx) — Market Movers widget (Gainers/Losers/Most Active tabs)"
      x-primary-source: >-
        Polygon grouped-daily bars (`/v2/aggs/grouped/locale/us/market/stocks/{date}`),
        diffed across the two most recent trading days, top/bottom 20 by
        %change; enriched with name/sector/cap via FMP profile lookups.
        Synced once daily at 18:00 ET (after Polygon's EOD aggregation
        window) — this plan has no real-time gainers/losers endpoint
        (confirmed NOT_AUTHORIZED on the current Polygon tier).
      x-alternate-source: >-
        Polygon real-time snapshot
        `/v2/snapshot/locale/us/markets/stocks/{direction}` — same vendor,
        but requires a paid plan upgrade; would give intraday-live movers
        instead of the current once-a-day-after-close refresh.
      x-fallback-behavior: >-
        Automatic on two independent axes. (1) The base gainers/losers list:
        MOVERS_SOURCE (default polygon, EOD-bar diff) falls back to
        MOVERS_FALLBACK_SOURCE (default fmp, vendor-computed biggest-gainers/
        biggest-losers — no volume field, declared as a FIELD_NOT_SUPPORTED
        warning) if the primary throws; only if both fail does this return
        502. (2) Per-ticker name/sector/cap enrichment: MOVER_ENRICHMENT_SOURCE
        (default fmp) falls back to MOVER_ENRICHMENT_FALLBACK_SOURCE (default
        polygon, approximate free-text sector) per ticker; if both fail for
        one ticker, that mover is still written with name/sector/cap left
        null and a SUB_REQUEST_FAILED warning, it does not fail the whole
        request. Set either *_FALLBACK_SOURCE to "none" to disable.
      x-write-pattern: >-
        MUTABLE / upsert-latest — `market_movers/{direction_TICKER}` is
        overwritten every sync. A sibling append-only collection,
        `market_movers_history/{date}_{direction}_{ticker}`, is written in
        the SAME transaction and never touched again once its date has
        passed — see GET /market-movers/history below. Re-running today's
        sync twice is a harmless no-op on the history side (same doc id),
        not a duplicate.
      operationId: listMarketMovers
      parameters:
        - name: direction
          in: query
          schema: { type: string, enum: [gainer, loser] }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/MarketMover" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "502": { $ref: "#/components/responses/UpstreamError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /market-movers/history:
    get:
      tags: [MarketMovers]
      summary: Full mover history (append-only, one row per trading day)
      description: >-
        Firestore `market_movers_history/{date}_{direction}_{ticker}` —
        unlike GET /market-movers (which only ever shows the latest
        snapshot), this never loses a day: each closed trading day gets its
        own permanent document, written once and never overwritten.
      x-status: live
      x-consumed-by:
        - "Not consumed by any screen today — no screen reads market_movers_history yet, only the latest-snapshot market_movers collection. Written for a future trend/history UI."
      x-primary-source: Same sync as GET /market-movers — see that path for vendor/fallback details.
      x-write-pattern: IMMUTABLE / append-only. Insert with ON CONFLICT (ticker, direction, as_of_date) DO NOTHING once migrated to a relational store (see Doc/schema.sql market_movers_history).
      operationId: listMarketMoverHistory
      parameters:
        - name: ticker
          in: query
          schema: { type: string }
        - name: direction
          in: query
          schema: { type: string, enum: [gainer, loser] }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/MarketMover" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "502": { $ref: "#/components/responses/UpstreamError" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  # ────────────────────────────────────────────────────────────────────────
  # SECTORS — live
  # ────────────────────────────────────────────────────────────────────────
  /sectors:
    get:
      tags: [Sectors]
