components:
  parameters:
    Ticker:
      name: ticker
      in: path
      required: true
      schema: { type: string, example: NVDA }
    Uid:
      name: uid
      in: path
      required: true
      schema: { type: string }
    JobName:
      name: job
      in: path
      required: true
      schema:
        type: string
        enum:
          - companies
          - market-movers
          - sectors
          - market-indices
          - earnings
          - analyst-actions
          - news
          - sec-13f
          - sec-form4
          - ticker-universe

  headers:
    RetryAfter:
      description: Seconds to wait before retrying. Present on every 429 response.
      schema: { type: integer, example: 30 }

  responses:
    # ── Every error response below uses the SAME schema (ErrorResponse) and is
    # never returned empty — `message` is always a complete, human-readable
    # sentence, and `error` is always a stable machine code a client can
    # switch on. No endpoint in this spec silently returns 200 with an empty
    # body on failure. ──
    BadRequest:
      description: Invalid request — a query/path parameter failed validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example: { statusCode: 400, error: INVALID_PARAMETER, message: "Query parameter 'from' must be an ISO date (YYYY-MM-DD); got 'yesterday'.", timestamp: "2026-07-05T14:00:00Z" }
    Unauthorized:
      description: No valid Firebase Auth session
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example: { statusCode: 401, error: UNAUTHENTICATED, message: "No valid session — sign in and retry.", timestamp: "2026-07-05T14:00:00Z" }
    Forbidden:
      description: Authenticated, but not allowed to access this resource (Firestore security rule denial)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example: { statusCode: 403, error: PERMISSION_DENIED, message: "uid does not own this watchlist.", timestamp: "2026-07-05T14:00:00Z" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example: { statusCode: 404, error: NOT_FOUND, message: "No company document found for ticker 'ZZZZ'.", timestamp: "2026-07-05T14:00:00Z" }
    TooManyRequests:
      description: >-
        This endpoint's upstream vendor quota is exhausted (e.g. FMP's 250
        req/day free tier, Polygon's 5 req/min free tier, SEC EDGAR's 10
        req/sec cap). Never silent — always names which vendor throttled and
        includes `Retry-After`.
      headers:
        Retry-After: { $ref: "#/components/headers/RetryAfter" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example: { statusCode: 429, error: VENDOR_RATE_LIMITED, message: "FMP daily quota exhausted (250 req/day on this plan) — resets at 00:00 UTC.", source: fmp, retryable: true, timestamp: "2026-07-05T14:00:00Z" }
    UpstreamError:
      description: >-
        The upstream vendor returned an error, malformed data, or timed out.
        If a fallback source is configured for this path (see
        `x-fallback-behavior`) it was already tried and also failed —
        `fallbackAttempted` lists every source tried and why each failed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            statusCode: 502
            error: UPSTREAM_VENDOR_ERROR
            message: "All sources failed for company NVDA: fmp (HTTP 500 from FMP profile endpoint, retryable), polygon (no data returned (ticker not found on this source), not retryable)"
            retryable: true
            fallbackAttempted:
              - source: fmp
                error: "HTTP 500 from FMP profile endpoint"
              - source: polygon
                error: "no data returned (ticker not found on this source)"
            timestamp: "2026-07-05T14:00:00Z"
    ServiceUnavailable:
      description: The backend itself (or Firestore) is unreachable — distinct from an upstream vendor failure.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example: { statusCode: 503, error: SERVICE_UNAVAILABLE, message: "Firestore write failed after 3 retries — see backend logs for the underlying gRPC error.", retryable: true, timestamp: "2026-07-05T14:00:00Z" }
    NotImplemented:
      description: "This path is documented (schema is final) but no backend job/controller exists yet — see this path's x-status extension (planned)."
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example: { statusCode: 501, error: NOT_IMPLEMENTED, message: "No sync job exists for this collection yet — see x-primary-source/x-alternate-source on this path for what's needed to build it.", timestamp: "2026-07-05T14:00:00Z" }

  schemas:
    AdapterWarning:
      type: object
      description: >-
        A non-fatal, structured degradation note attached to a document or
        list response — the mechanism that keeps partial/degraded data from
        being indistinguishable from "vendor genuinely has no data." Mirrors
        `backend/src/adapters/types.ts`'s `AdapterWarning`.
      required: [code, message]
      properties:
        code:
          type: string
          enum: [SUB_REQUEST_FAILED, FIELD_NOT_SUPPORTED, FALLBACK_USED, STALE_DATA]
          description: |
            - SUB_REQUEST_FAILED: one of several parallel vendor calls failed; others succeeded (transient, likely retryable on the next scheduled sync).
            - FIELD_NOT_SUPPORTED: this source structurally never has this field — not a failure, a permanent gap on this vendor.
            - FALLBACK_USED: the primary source failed or returned nothing; this document was served by the configured fallback instead.
            - STALE_DATA: returned data is older than expected (e.g. last successful sync, not this run).
        message: { type: string, description: "Always a complete sentence — never blank." }
        field: { type: string, nullable: true, description: "Comma-separated canonical field name(s) affected, when applicable." }

    ListEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: {}
        meta:
          type: object
          required: [count, asOf]
          properties:
            count: { type: integer }
            asOf: { type: string, format: date-time }
            source: { type: string, description: "Vendor that produced this batch" }
            warnings:
              type: array
              default: []
              description: Batch-level degradation notes (e.g. partial-batch sync failures) — empty array, never omitted, when everything succeeded.
              items: { $ref: "#/components/schemas/AdapterWarning" }

    ErrorResponse:
      type: object
      description: >-
        The single error shape used by every 4xx/5xx response in this API.
        `message` is always populated with a complete, specific sentence —
        never empty, never a generic "An error occurred."
      required: [statusCode, error, message, timestamp]
      properties:
        statusCode: { type: integer }
        error:
          type: string
          description: Stable machine-readable code — safe to switch on in client code.
          enum:
            - INVALID_PARAMETER
            - UNAUTHENTICATED
            - PERMISSION_DENIED
            - NOT_FOUND
            - VENDOR_RATE_LIMITED
            - UPSTREAM_VENDOR_ERROR
            - SERVICE_UNAVAILABLE
            - NOT_IMPLEMENTED
        message: { type: string, description: "Human-readable, specific explanation — always non-empty." }
        source: { type: string, nullable: true, description: "Vendor/adapter that failed, when this error originated from a vendor call." }
        retryable: { type: boolean, nullable: true, description: "True if retrying later is likely to succeed (rate limit, timeout, 5xx). False for permanent conditions (not found, bad request)." }
        fallbackAttempted:
          type: array
          nullable: true
          description: Present only on UPSTREAM_VENDOR_ERROR when a fallback source was configured and also failed — every attempt, in order.
          items:
            type: object
            properties:
              source: { type: string }
              error: { type: string }
        timestamp: { type: string, format: date-time }

    SyncJobStatus:
      type: object
      description: >-
        GET /sync/jobs's per-job entry. `collections`/`cronExpression`/
        `timeZone` (added 2026-07-09) come from the in-process SyncRegistry
        (declared once per job at registration time, next to its
        @Cron(...)) — always populated even when Firestore itself is
        unreachable (see `metaError`), unlike lastSyncedAt/lastStatus/
        lastCount/lastError which depend on reading sync_meta.
      properties:
        name: { type: string, example: market-movers }
        isRunning: { type: boolean }
        runningSince: { type: string, format: date-time, nullable: true }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
        lastStatus: { type: string, enum: [ok, error], nullable: true }
        lastCount: { type: integer, nullable: true }
        lastError: { type: string, nullable: true }
        collections: { type: array, items: { type: string }, example: ["market_movers", "market_movers_history"] }
        cronExpression: { type: string, example: "0 18 * * 1-5" }
        timeZone: { type: string, example: "America/New_York" }
        nextRunAt: { type: string, format: date-time, nullable: true, description: "Added 2026-07-09. Computed fresh on every call via the `cron` package's CronJob.nextDate() (the same library @nestjs/schedule's @Cron(...) uses internally, so this always agrees with when the job will actually fire) — never cached/stored, never re-derived by hand-rolled cron math. Null only if cronExpression itself fails to parse." }
        metaError: { type: string, nullable: true, description: "Set instead of the last* fields when sync_meta itself couldn't be read (e.g. Firestore auth failure) — the job still appears with its registry-known collections/schedule." }

    SyncMeta:
      type: object
      description: >-
        Firestore `sync_meta/{jobName}` — persisted on every run by
        SyncMetaService.record(). collections/cronExpression/timeZone
        (added 2026-07-09) are looked up from SyncRegistry at record time
        and written alongside the run result, so this doc alone answers
        "which table did this job affect, and how often does it run"
        without reading backend source.
      properties:
        job: { type: string }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
        lastStatus: { type: string, nullable: true }
        lastCount: { type: integer, nullable: true }
        lastError: { type: string, nullable: true }
        collections: { type: array, items: { type: string }, nullable: true }
        cronExpression: { type: string, nullable: true }
        timeZone: { type: string, nullable: true }

    Company:
      type: object
      description: Firestore `companies/{ticker}` — written by companies.job.ts
      properties:
        ticker: { type: string, example: NVDA }
        name: { type: string, example: NVIDIA Corporation }
        price: { type: number, nullable: true }
        pctChange: { type: number, nullable: true }
        marketCap: { type: number, nullable: true, description: "USD, raw dollars (not billions)" }
        beta: { type: number, nullable: true }
        sector: { type: string, nullable: true }
        industry: { type: string, nullable: true }
        exchange: { type: string, nullable: true }
        week52Range: { type: string, nullable: true }
        volume: { type: number, nullable: true }
        averageVolume: { type: number, nullable: true }
        description: { type: string, nullable: true }
        peRatio: { type: number, nullable: true, description: "null when FMP's ratios-ttm plan restriction rejects this symbol" }
        eps: { type: number, nullable: true }
        dividendYield: { type: number, nullable: true }
        dividendPerShare: { type: number, nullable: true }
        peers:
          type: array
          items: { type: string }
        source: { type: string, nullable: true, example: fmp, description: "Which CompanyProfileAdapter actually served THIS document — 'fmp' or 'polygon'. Differs from the configured COMPANY_PROFILE_SOURCE when a FALLBACK_USED warning is present below." }
        warnings:
          type: array
          default: []
          description: Structured degradation notes (see AdapterWarning) — e.g. a fallback was used, or ratios-ttm failed for this symbol. Empty array, never omitted, when the fetch was fully clean.
          items: { $ref: "#/components/schemas/AdapterWarning" }
        updatedAt: { type: string, format: date-time }
        rsRating:
          type: integer
          nullable: true
          minimum: 1
          maximum: 99
          description: >-
            Written by backend/src/sync/rs-rating.job.ts, NOT companies.job.ts
            — an independent, from-scratch approximation of an IBD-style
            relative-strength score (most-recent-quarter-weighted trailing
            returns, ranked 1-99 within TICKER_UNIVERSE), not the literal
            proprietary IBD formula. Null until enough real ohlcv_bars
            history has accumulated for this ticker.
        rsRatingUpdatedAt: { type: string, format: date-time, nullable: true }

    TickerListing:
      type: object
      description: >-
        Firestore `tickers/{ticker}` — reference fields (ticker, name,
        market, ...) written weekly by ticker-universe.job.ts; price/
        pctChange/volume fields written daily by market-quotes.job.ts,
        merged onto the same doc. A ticker market-quotes.job.ts sees before
        ticker-universe.job.ts has ever discovered it still gets a doc,
        just missing name/exchange/etc. until the next weekly sync. Full
        fundamentals (P/E, sector, dividend yield, peers, beta) are NOT
        here at any tier — see Company for that, on the curated
        TICKER_UNIVERSE subset only (241 tickers, not the whole market).
      properties:
        ticker: { type: string, example: NVDA }
        name: { type: string, nullable: true, example: NVIDIA Corp }
        market: { type: string, nullable: true, example: stocks }
        locale: { type: string, nullable: true, example: us }
        primaryExchange: { type: string, nullable: true, description: "Polygon MIC code, e.g. XNAS, XNYS" }
        type: { type: string, nullable: true, description: "e.g. CS (common stock), ETF, ADRC, WARRANT" }
        active: { type: boolean, description: "false for delisted tickers" }
        currencyName: { type: string, nullable: true, example: usd }
        cik: { type: string, nullable: true }
        compositeFigi: { type: string, nullable: true }
        shareClassFigi: { type: string, nullable: true }
        source: { type: string, example: polygon }
        updatedAt: { type: string, format: date-time }
        price: { type: number, nullable: true, description: "Written by market-quotes.job.ts — null until that job has run at least once for this ticker." }
        pctChange: { type: number, nullable: true }
        volume: { type: number, nullable: true }
        asOfDate: { type: string, format: date, nullable: true }
        quoteSource: { type: string, nullable: true, example: polygon }
        quoteUpdatedAt: { type: string, format: date-time, nullable: true }

    MarketMover:
      type: object
      description: Firestore `market_movers/{gainer_TICKER | loser_TICKER}` — written by market-movers.job.ts
      properties:
        ticker: { type: string }
        price: { type: number }
        pctChange: { type: number }
        volume: { type: number }
        asOfDate: { type: string, format: date }
        name: { type: string, nullable: true }
        sector: { type: string, nullable: true }
        cap: { type: string, nullable: true, enum: [Mega, Large, Mid, Small, Micro] }
        direction: { type: string, enum: [gainer, loser] }
        source: { type: string, nullable: true, example: polygon, description: "Which MoversAdapter actually served THIS document — 'polygon' or 'fmp'. Differs from the configured MOVERS_SOURCE when a FALLBACK_USED warning is present below." }
        warnings:
          type: array
          default: []
          description: Structured degradation notes (see AdapterWarning) — e.g. name/sector/cap enrichment failed for this ticker. Empty array, never omitted, when clean.
          items: { $ref: "#/components/schemas/AdapterWarning" }
        updatedAt: { type: string, format: date-time }

    Sector:
      type: object
      description: Firestore `sectors/{sectorSlug}` — written by sectors.job.ts
      properties:
        sector: { type: string, example: Technology }
        exchange: { type: string }
        pctChange: { type: number }
        asOfDate: { type: string, format: date }
        updatedAt: { type: string, format: date-time }

    MarketIndex:
      type: object
      description: Firestore `market_indices/{symbol}` — written by market-indices.job.ts
      properties:
        label: { type: string, example: S&P 500 }
        proxyTicker: { type: string, example: SPY }
        isProxy: { type: boolean, example: true }
        note: { type: string, nullable: true }
        value: { type: number }
        change: { type: number }
        pctChange: { type: number }
        open: { type: number }
        prevClose: { type: number }
        updatedAt: { type: string, format: date-time }

    MacroEvent:
      type: object
      description: >-
        Firestore `macro_events/{seriesId}` — written by macro-events.job.ts.
        Latest FRED observation for a curated indicator, plus the prior
        reading. `estimate` is always null — FRED is a pure time-series API
        with no consensus-estimate concept (unlike Finnhub's economic
        calendar, which is confirmed blocked on the current plan).
      properties:
        seriesId: { type: string, example: CPIAUCSL }
        name: { type: string, example: CPI (All Items) }
        country: { type: string, example: US }
        unit: { type: string, example: "%" }
        importance: { type: string, enum: [high, medium, low] }
        eventDate: { type: string, format: date, description: Date of the latest published observation. }
        actual: { type: number, nullable: true }
        previous: { type: number, nullable: true }
        estimate: { type: number, nullable: true, description: Always null — FRED has no consensus-estimate field. }
        source: { type: string, example: fred }
        updatedAt: { type: string, format: date-time }

    OhlcvBar:
      type: object
      description: >-
        Firestore `ohlcv_bars/{ticker}_{date}` — written by
        stock-history.job.ts. One immutable doc per (ticker, date), never
        overwritten once a trading day closes.
      properties:
        ticker: { type: string }
        barDate: { type: string, format: date }
        timespan: { type: string, example: day }
        open: { type: number }
        high: { type: number }
        low: { type: number }
        close: { type: number }
        volume: { type: number }
        source: { type: string, example: polygon }

    Dividend:
      type: object
      description: >-
        Firestore `dividends/{ticker}` — written by dividends.job.ts. Next
        upcoming ex-dividend event only, not a full per-event history.
      properties:
        ticker: { type: string }
        exDividendDate: { type: string, format: date }
        recordDate: { type: string, format: date, nullable: true }
        paymentDate: { type: string, format: date, nullable: true }
        declarationDate: { type: string, format: date, nullable: true }
        dividendAmount: { type: number }
        yieldPct: { type: number, nullable: true }
        frequency: { type: string, nullable: true, example: Quarterly }
        source: { type: string, example: fmp }
        updatedAt: { type: string, format: date-time }

    OptionsChain:
      type: object
      description: >-
        Firestore `options_chains/{underlyingTicker}` — written by
        options-chains.job.ts. Contract list is a small curated set (nearest
        expiration, up to 20 contracts), not the full chain. No bid/ask, IV,
        greeks, or open interest — see `note` and the job's docblock.
      properties:
        underlyingTicker: { type: string, example: AAPL }
        contracts:
          type: array
          items:
            type: object
            properties:
              contractTicker: { type: string, example: "O:AAPL260717C00225000" }
              contractType: { type: string, enum: [call, put] }
              strike: { type: number }
              expirationDate: { type: string, format: date }
              lastClose: { type: number, nullable: true }
              lastVolume: { type: number, nullable: true }
              lastBarDate: { type: string, format: date, nullable: true }
        source: { type: string, example: polygon }
        note: { type: string }
        updatedAt: { type: string, format: date-time }

    IpoEvent:
      type: object
      description: >-
        Firestore `ipos/{date}_{symbol|slug}` — written by ipos.job.ts.
        `symbol` is null for pre-ticker filings (SPACs and other early-stage
        S-1 filers commonly file before a ticker is assigned).
      properties:
        date: { type: string, format: date }
        symbol: { type: string, nullable: true }
        name: { type: string }
        exchange: { type: string, nullable: true }
        priceLow: { type: number, nullable: true }
        priceHigh: { type: number, nullable: true }
        numberOfShares: { type: number, nullable: true }
        totalSharesValue: { type: number, nullable: true }
        status: { type: string, enum: [expected, priced, filed, withdrawn] }
        source: { type: string, example: finnhub }
        updatedAt: { type: string, format: date-time }

    EarningsEvent:
      type: object
      description: Firestore `earnings_events/{ticker}_{date}` — written by earnings.job.ts
      properties:
        ticker: { type: string }
        date: { type: string, format: date }
        epsEstimate: { type: number, nullable: true }
        epsActual: { type: number, nullable: true }
        revenueEstimate: { type: number, nullable: true }
        revenueActual: { type: number, nullable: true }
        updatedAt: { type: string, format: date-time }

    AnalystConsensus:
      type: object
      description: Firestore `analyst_actions/{ticker}` — written by analyst-actions.job.ts
      properties:
        ticker: { type: string }
        source: { type: string, example: fmp_consensus_interim }
        strongBuy: { type: integer }
        buy: { type: integer }
        hold: { type: integer }
        sell: { type: integer }
        strongSell: { type: integer }
        consensus: { type: string, example: Buy }
        updatedAt: { type: string, format: date-time }

    InsiderTransaction:
      type: object
      description: Firestore `insider_transactions/{accessionNumber}_{i}` — written by sec-form4.job.ts
      properties:
        ticker: { type: string }
        issuerName: { type: string, nullable: true }
        ownerName: { type: string, nullable: true }
        isOfficer: { type: boolean }
        officerTitle: { type: string, nullable: true }
        transactionDate: { type: string, format: date }
        transactionCode: { type: string, example: "S" }
        acquiredOrDisposed: { type: string, enum: [A, D] }
        shares: { type: number }
        pricePerShare: { type: number, nullable: true }
        sharesOwnedAfter: { type: number, nullable: true }
        filingDate: { type: string, format: date }
        updatedAt: { type: string, format: date-time }

    FundHoldings:
      type: object
      description: Firestore `fund_holdings/{cik}` — written by sec-13f.job.ts
      properties:
        fundName: { type: string }
        latestFilingDate: { type: string, format: date }
        latestAccessionNumber: { type: string }
        totalPositions: { type: integer }
        totalValue: { type: number, description: "USD, as reported (thousands per SEC convention)" }
        updatedAt: { type: string, format: date-time }

    FundPosition:
      type: object
      description: Firestore `fund_holdings/{cik}/filings/{accessionNumber}/positions/{cusip}` — written by sec-13f.job.ts
      properties:
        cusip: { type: string }
        nameOfIssuer: { type: string }
        value: { type: number }
        shares: { type: number }
        pctOfPortfolio: { type: number, nullable: true }

    NewsArticle:
      type: object
      description: Firestore `news/{ticker}_{articleId}` — written by news.job.ts
      properties:
        ticker: { type: string }
        headline: { type: string }
        summary: { type: string }
        source: { type: string }
        url: { type: string, format: uri }
        category: { type: string, nullable: true }
        sentiment: { type: string, enum: [positive, negative, neutral], nullable: true, description: "Polygon-only — null when served by the Finnhub fallback (structurally absent there)." }
        sentimentReasoning: { type: string, nullable: true, description: "Polygon-only — null when served by the Finnhub fallback." }
        keywords: { type: array, items: { type: string }, description: "Empty when served by the Finnhub fallback." }
        publishedAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Watchlist:
      type: object
      description: Firestore `users/{uid}/watchlists/default`
      properties:
        name: { type: string, example: My Watchlist }
        tickers:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }

    Portfolio:
      type: object
      description: >-
        Firestore `users/{uid}/portfolios/default` — the parent doc of the
        `holdings` subcollection. `name`/`createdAt` are written once on the
        first holding add; `totalValue`/`dayPL`/`dayPLPct`/`holdingsCount`/
        `updatedAt` are a materialized summary, written client-side
        (debounced ~3s) by app/iq/screens/portfolio.tsx whenever holdings or
        live prices change meaningfully. Display in the app never reads this
        cached summary back — it's recomputed live from holdings + companies
        on every render for zero-latency UI; the stored copy exists so
        something outside the browser (future notifications, a backend job,
        historical tracking) can read portfolio value without recomputing it.
      properties:
        name: { type: string, example: My Portfolio }
        createdAt: { type: string, format: date-time }
        totalValue: { type: number, description: "sum(shares * livePrice) across holdings" }
        dayPL: { type: number, description: "sum(shares * livePrice * pctChange / 100) across holdings" }
        dayPLPct: { type: number, description: "dayPL as a % of yesterday's total value" }
        holdingsCount: { type: integer }
        updatedAt: { type: string, format: date-time, description: "Set on every materialized-summary write, not on holding add/remove alone." }

    Holding:
      type: object
      description: Firestore `users/{uid}/portfolios/default/holdings/{ticker}`
      properties:
        ticker: { type: string }
        shares: { type: number }
        positionSize: { type: string, enum: [Small, Medium, Large] }
        conviction: { type: string, enum: [High, Medium, Low] }
        addedAt: { type: string, format: date-time }

    HoldingInput:
      type: object
      required: [ticker, shares]
      properties:
        ticker: { type: string }
        shares: { type: number }
        positionSize: { type: string, enum: [Small, Medium, Large], default: Small }
        conviction: { type: string, enum: [High, Medium, Low], default: Medium }

    UserSettings:
      type: object
      description: Firestore `settings/{uid}`
      properties:
        alert: { type: boolean }
        font: { type: string }

    StockComment:
      type: object
      description: Firestore `stock_comments/{id}`
      properties:
        id: { type: string }
        uid: { type: string }
        sym: { type: string }
        name: { type: string }
        comment: { type: string }
        createdAt: { type: string, format: date-time }
